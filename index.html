<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZTR Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
body{
background:#050816;
color:white;
font-family:Arial;
}
.glass{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
}
</style>
</head>
<body>

<div class="max-w-6xl mx-auto p-4">

<h1 class="text-4xl font-bold text-center mb-6">ZTR Dashboard</h1>

<div id="walletSection" class="glass rounded-2xl p-6 mb-6 text-center">
<button onclick="connectWallet()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl font-bold">
Connect Wallet
</button>
<p id="walletText" class="mt-4 text-gray-300"></p>
</div>

<div id="registerSection" class="glass rounded-2xl p-6 mb-6 hidden">
<h2 class="text-2xl font-bold mb-4">Register</h2>

<input id="username" type="text" placeholder="Username"
class="w-full p-3 rounded-xl bg-black mb-3">

<input id="inviterId" type="number" placeholder="Inviter ID"
class="w-full p-3 rounded-xl bg-black mb-3">

<button onclick="registerUser()"
class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded-xl w-full font-bold">
Register Account
</button>
</div>

<div id="dashboard" class="hidden">

<div class="grid md:grid-cols-4 gap-4 mb-6">

<div class="glass p-5 rounded-2xl">
<h3 class="text-gray-400">User ID</h3>
<p id="userId" class="text-2xl font-bold"></p>
</div>

<div class="glass p-5 rounded-2xl">
<h3 class="text-gray-400">Balance</h3>
<p id="balance" class="text-2xl font-bold"></p>
</div>

<div class="glass p-5 rounded-2xl">
<h3 class="text-gray-400">Team Size</h3>
<p id="teamSize" class="text-2xl font-bold"></p>
</div>

<div class="glass p-5 rounded-2xl">
<h3 class="text-gray-400">Level</h3>
<p id="level" class="text-2xl font-bold"></p>
</div>

</div>

<div class="glass p-6 rounded-2xl mb-6">
<h2 class="text-2xl font-bold mb-4">Invite Information</h2>

<p class="mb-2">Invite Code:</p>
<div class="flex gap-2">
<input id="inviteCode" readonly class="flex-1 p-3 rounded-xl bg-black">
<button onclick="copyInviteCode()" class="bg-blue-600 px-4 rounded-xl">
Copy
</button>
</div>
</div>

<div class="grid md:grid-cols-2 gap-6">

<div class="glass p-6 rounded-2xl">
<h2 class="text-2xl font-bold mb-4">Income History</h2>
<div id="incomeHistory"></div>
</div>

<div class="glass p-6 rounded-2xl">
<h2 class="text-2xl font-bold mb-4">Salary History</h2>
<div id="salaryHistory"></div>
</div>

</div>

<div class="glass p-6 rounded-2xl mt-6">
<h2 class="text-2xl font-bold mb-4">Tasks</h2>

<div class="grid md:grid-cols-3 gap-4">

<button onclick="claimTask('telegram',5)"
class="bg-purple-600 p-4 rounded-xl font-bold">
Claim Telegram Task +5 ZTR
</button>

<button onclick="claimTask('twitter',5)"
class="bg-pink-600 p-4 rounded-xl font-bold">
Claim Twitter Task +5 ZTR
</button>

<button onclick="claimTask('youtube',10)"
class="bg-red-600 p-4 rounded-xl font-bold">
Claim YouTube Task +10 ZTR
</button>

</div>
</div>

<div class="glass p-6 rounded-2xl mt-6">
<h2 class="text-2xl font-bold mb-4">Level Upgrade</h2>

<div class="grid md:grid-cols-3 gap-4">

<button onclick="upgradeLevel(1)" class="bg-yellow-600 p-4 rounded-xl font-bold">
Upgrade Level 1
</button>

<button onclick="upgradeLevel(2)" class="bg-yellow-600 p-4 rounded-xl font-bold">
Upgrade Level 2
</button>

<button onclick="upgradeLevel(3)" class="bg-yellow-600 p-4 rounded-xl font-bold">
Upgrade Level 3
</button>

</div>
</div>

</div>

</div>

<script>

const API = 'https://ztr-backend.vercel.app';

let walletAddress = '';
let currentUser = null;

async function connectWallet(){

try{

if(!window.ethereum){
alert('Install MetaMask');
return;
}

const accounts = await ethereum.request({
method:'eth_requestAccounts'
});

walletAddress = accounts[0];

localStorage.setItem('wallet',walletAddress);

walletText.innerText = walletAddress;

await checkUser();

}catch(error){
console.log(error);
alert(error.message);
}
}

async function checkUser(){

try{

const response = await fetch(`${API}/api/user/${walletAddress}`);

const data = await response.json();

if(data.success){

currentUser = data.user;

showDashboard(data.user);

}else{

registerSection.classList.remove('hidden');
}

}catch(error){

registerSection.classList.remove('hidden');
}
}

async function registerUser(){

try{

const username = document.getElementById('username').value;
const inviterId = document.getElementById('inviterId').value;

if(!username || !inviterId){
alert('Fill all fields');
return;
}

const txHash = 'demo_tx_' + Date.now();

const response = await fetch(`${API}/api/register`,{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
wallet:walletAddress,
txHash,
inviterId:Number(inviterId),
username,
profilePic:'',
registrationCost:5
})
});

const data = await response.json();

if(data.success){

alert('Registration Successful');

await checkUser();

}else{
alert(data.error || 'Registration failed');
}

}catch(error){
console.log(error);
alert(error.message);
}
}

function showDashboard(user){

registerSection.classList.add('hidden');
dashboard.classList.remove('hidden');

userId.innerText = user.profile.userId;
balance.innerText = Number(user.ztrBalance || 0).toFixed(2) + ' ZTR';
teamSize.innerText = user.teamSize || 0;
level.innerText = user.level || 0;
inviteCode.value = user.inviteCode || '';

renderIncomeHistory(user.incomeHistory || []);
renderSalaryHistory(user.salaryHistory || []);
}

function renderIncomeHistory(history){

const container = document.getElementById('incomeHistory');

container.innerHTML = '';

if(history.length === 0){
container.innerHTML = '<p>No income history</p>';
return;
}

history.forEach(item=>{

container.innerHTML += `
<div class="bg-black p-3 rounded-xl mb-3">
<p class="font-bold">${item.type}</p>
<p>${Number(item.amount || 0).toFixed(2)} ZTR</p>
<p class="text-sm text-gray-400">${new Date(item.createdAt).toLocaleString()}</p>
</div>
`;
});
}

function renderSalaryHistory(history){

const container = document.getElementById('salaryHistory');

container.innerHTML = '';

if(history.length === 0){
container.innerHTML = '<p>No salary history</p>';
return;
}

history.forEach(item=>{

container.innerHTML += `
<div class="bg-black p-3 rounded-xl mb-3">
<p class="font-bold">${item.type}</p>
<p>${Number(item.amount || 0).toFixed(2)} ZTR</p>
<p class="text-sm text-gray-400">${new Date(item.createdAt).toLocaleString()}</p>
</div>
`;
});
}

async function claimTask(taskId,reward){

try{

const response = await fetch(`${API}/api/claim-task`,{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
wallet:walletAddress,
taskId,
reward
})
});

const data = await response.json();

if(data.success){
alert('Task Claimed Successfully');
await refreshUser();
}else{
alert(data.error || 'Failed');
}

}catch(error){
console.log(error);
}
}

async function upgradeLevel(levelNumber){

try{

const txHash = 'upgrade_' + Date.now();

const response = await fetch(`${API}/api/upgrade-level`,{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
wallet:walletAddress,
level:levelNumber,
txHash
})
});

const data = await response.json();

if(data.success){
alert('Level Upgraded Successfully');
await refreshUser();
}else{
alert(data.error || 'Upgrade failed');
}

}catch(error){
console.log(error);
}
}

async function refreshUser(){

const response = await fetch(`${API}/api/user/${walletAddress}`);
const data = await response.json();

if(data.success){
showDashboard(data.user);
}
}

function copyInviteCode(){

navigator.clipboard.writeText(inviteCode.value);

alert('Invite code copied');
}

window.onload = async ()=>{

const savedWallet = localStorage.getItem('wallet');

if(savedWallet){
walletAddress = savedWallet;
walletText.innerText = walletAddress;
await checkUser();
}
}

</script>

</body>
</html>
