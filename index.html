<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Web3 Portal</title>
    <!-- Include Ethers.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        h1 { color: #333; font-size: 24px; }
        .btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            margin-top: 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #45a049; }
        .hidden { display: none; }
        .info {
            margin-top: 20px;
            text-align: left;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Web3 Portal</h1>
    
    <!-- Connect Button -->
    <button id="connectBtn" class="btn">Connect Wallet</button>

    <!-- User Dashboard (Hidden by default) -->
    <div id="dashboard" class="hidden">
        <div class="info">
            <p><strong>Status:</strong> Connected 🔐</p>
            <p><strong>Address:</strong> <span id="walletAddress">Loading...</span></p>
            <p><strong>Balance:</strong> <span id="walletBalance">Loading...</span> ETH</p>
        </div>
        <button id="actionBtn" class="btn" style="background-color: #007bff;">Initiate Transaction</button>
    </div>
</div>

<script>
    let provider;
    let signer;

    const connectBtn = document.getElementById('connectBtn');
    const dashboard = document.getElementById('dashboard');
    const walletAddressEl = document.getElementById('walletAddress');
    const walletBalanceEl = document.getElementById('walletBalance');
    const actionBtn = document.getElementById('actionBtn');

    // Check if wallet is already connected on page load
    window.onload = async () => {
        if (typeof window.ethereum !== 'undefined') {
            provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await provider.listAccounts();
            if (accounts.length > 0) {
                // Wallet is already connected, load dashboard
                handleConnection(accounts[0]);
            }
        } else {
            connectBtn.innerText = "Please Install MetaMask";
            connectBtn.disabled = true;
        }
    };

    // Connect Wallet Function
    connectBtn.addEventListener('click', async () => {
        try {
            if (!window.ethereum) throw new Error("No crypto wallet found. Please install it.");
            
            // Request account access
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            handleConnection(accounts[0]);
        } catch (err) {
            console.error(err.message);
            alert("Connection failed or rejected by user.");
        }
    });

    // Handle UI updates after connection
    async function handleConnection(account) {
        connectBtn.classList.add('hidden');
        dashboard.classList.remove('hidden');
        
        signer = await provider.getSigner();
        const address = await signer.getAddress();
        
        // Format address for display
        walletAddressEl.innerText = `${address.substring(0, 6)}...${address.substring(address.length - 4)}`;

        // Get and format balance
        const balanceWei = await provider.getBalance(address);
        const balanceEth = ethers.formatEther(balanceWei);
        walletBalanceEl.innerText = parseFloat(balanceEth).toFixed(4);
    }

    // Example of prompting a user for a secure transaction
    actionBtn.addEventListener('click', async () => {
        try {
            alert("In a standard Web3 system, transferring funds requires the user to manually sign the transaction via their wallet provider.");
            
            // Example transaction structure (Requires User Approval via MetaMask)
            /*
            const tx = await signer.sendTransaction({
                to: "0xRecipientAddressHere",
                value: ethers.parseEther("0.01")
            });
            console.log("Transaction Hash:", tx.hash);
            */
        } catch (error) {
            console.error("Transaction failed or rejected:", error);
        }
    });

    // Listen for account changes (e.g., user switches accounts in MetaMask)
    if (window.ethereum) {
        window.ethereum.on('accountsChanged', (accounts) => {
            if (accounts.length > 0) {
                handleConnection(accounts[0]);
            } else {
                // User disconnected
                connectBtn.classList.remove('hidden');
                dashboard.classList.add('hidden');
            }
        });
    }
</script>

</body>
</html>
