<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Secure Web3 USDT Portal</title>
    <!-- Ethers.js v6 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #667eea;
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        
        body {
            background: radial-gradient(circle at 50% 0%, #1e293b, var(--bg-color));
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            z-index: 1;
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .network-badge {
            background: rgba(245, 175, 25, 0.2);
            color: #f5af19;
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .network-badge.active { color: var(--primary); background: rgba(0, 255, 204, 0.1); }

        h1 { font-size: 28px; margin-bottom: 5px; text-align: center; }
        .subtitle { color: var(--text-muted); text-align: center; font-size: 14px; margin-bottom: 30px; }

        .btn {
            background: linear-gradient(135deg, var(--secondary), #764ba2);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .hidden { display: none !important; }

        /* Dashboard Styles */
        .profile-card {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .address-box { font-family: monospace; color: var(--primary); cursor: pointer; }
        .disconnect-btn { background: rgba(239, 68, 68, 0.2); color: var(--danger); border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; }

        .balances { display: flex; gap: 15px; margin-bottom: 25px; }
        .balance-box {
            flex: 1;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .balance-box h3 { font-size: 24px; margin: 5px 0; font-weight: 700; }
        .balance-box p { color: var(--text-muted); font-size: 12px; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            outline: none;
        }
        .input-group input:focus { border-color: var(--primary); }
        .max-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: rgba(0, 255, 204, 0.2); color: var(--primary);
            border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        .history-box { margin-top: 20px; font-size: 12px; }
        .history-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .history-item a { color: var(--primary); text-decoration: none; }

        /* Toast Notifications */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .toast {
            background: white; color: black; padding: 15px 25px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex; align-items: center; gap: 10px; font-weight: 500;
            animation: slideInRight 0.3s ease forwards;
            max-width: 320px;
        }
        .toast.error { border-left: 5px solid var(--danger); }
        .toast.success { border-left: 5px solid var(--success); }
        .toast.info { border-left: 5px solid #3b82f6; }

        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Custom Permission Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-content {
            background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px;
            text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transform: translateY(-20px); transition: 0.3s;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-icon { font-size: 40px; color: #f5af19; margin-bottom: 15px; }
        .modal-title { font-size: 20px; margin-bottom: 10px; color: white; }
        .modal-text { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }
        .modal-amount { font-size: 28px; color: var(--primary); font-weight: bold; margin-bottom: 20px; }
        .modal-buttons { display: flex; gap: 10px; }
        .btn-cancel { background: rgba(255,255,255,0.1); color: white; flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; }
        .btn-confirm { background: var(--success); color: white; flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .btn-cancel:hover { background: rgba(255,255,255,0.2); }
        .btn-confirm:hover { background: #059669; }

        .gas-warning {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 8px;
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
            color: var(--danger);
        }
    </style>
</head>
<body>

<div id="toast-container"></div>

<!-- Custom Permission Modal -->
<div class="modal-overlay" id="permissionModal">
    <div class="modal-content">
        <i class="fa-solid fa-shield-halved modal-icon"></i>
        <h2 class="modal-title">Confirm Payment</h2>
        <p class="modal-text">Do you approve sending this amount to Admin?</p>
        <div class="modal-amount" id="modalAmountDisplay">0.00 USDT</div>
        <p style="font-size: 11px; color: #94a3b8; margin-bottom: 20px; word-break: break-all;">
            To: <span id="modalAdminAddress" style="color: var(--primary);"></span>
        </p>
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeModal()">Reject</button>
            <button class="btn-confirm" id="confirmTxBtn"><i class="fa-solid fa-check"></i> Approve</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="header-top">
        <div class="network-badge" id="networkBadge">
            <i class="fa-solid fa-circle-dot"></i> BSC Network
        </div>
    </div>
    
    <h1><i class="fa-brands fa-ethereum"></i> USDT Web3 Portal</h1>
    <div class="subtitle">Securely transfer BEP-20 tokens</div>

    <div id="connectState">
        <button id="connectBtn" class="btn">
            <i class="fa-solid fa-wallet"></i> Connect Wallet
        </button>
    </div>

    <div id="dashboardState" class="hidden">
        <div class="profile-card">
            <div>
                <small style="color: var(--text-muted)">Connected Address</small>
                <div class="address-box" id="walletAddress" onclick="copyAddress()" title="Click to copy">0x...</div>
            </div>
            <button class="disconnect-btn" onclick="disconnectWallet()">
                <i class="fa-solid fa-power-off"></i> Disconnect
            </button>
        </div>

        <div class="balances">
            <div class="balance-box">
                <p>BNB Balance</p>
                <h3 id="bnbBalance">0.0000</h3>
            </div>
            <div class="balance-box">
                <p>USDT Balance</p>
                <h3 id="usdtBalance">0.00</h3>
            </div>
        </div>

        <div class="input-group">
            <input type="number" id="amountInput" placeholder="Enter USDT Amount" min="0" step="any">
            <button class="max-btn" onclick="setMaxAmount()">MAX</button>
        </div>

        <button id="sendBtn" class="btn" style="margin-bottom: 10px;">
            <i class="fa-solid fa-paper-plane"></i> Send to Admin
        </button>

        <div class="history-box" id="txHistory">
            <h4 style="margin-bottom: 10px; color: var(--text-muted);">Recent Transactions</h4>
            <div id="historyList"></div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // ⚙️ SYSTEM CONFIGURATION
    // ==========================================
    const ADMIN_WALLET = "0x742d35Cc6634C0532925a3b844Bc9e7599e6c8a2"; 
    const USDT_CONTRACT = "0x55d398326f99059fF775485246999027B3197955"; 
    const CHAIN_ID = 56n; 
    
    const USDT_ABI = [
        "function balanceOf(address owner) view returns (uint256)",
        "function transfer(address to, uint256 amount) returns (bool)",
        "function decimals() view returns (uint8)"
    ];

    let provider, signer, userAddress;
    let autoRefreshInterval;
    let rawUsdtBalance = "0";
    let rawBnbBalance = "0";
    let pendingAmount = "0";
    let usdtDecimals = 18; // BSC USDT has 18 decimals

    const connectState = document.getElementById('connectState');
    const dashboardState = document.getElementById('dashboardState');
    const connectBtn = document.getElementById('connectBtn');
    const sendBtn = document.getElementById('sendBtn');
    const amountInput = document.getElementById('amountInput');
    const permissionModal = document.getElementById('permissionModal');

    document.getElementById('modalAdminAddress').innerText = ADMIN_WALLET;

    function showToast(message, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        
        let icon = 'fa-circle-info';
        if(type === 'success') icon = 'fa-check-circle';
        if(type === 'error') icon = 'fa-circle-xmark';

        toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
        container.appendChild(toast);

        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 5000);
    }

    function copyAddress() {
        if (userAddress) {
            navigator.clipboard.writeText(userAddress);
            showToast('Address copied!', 'success');
        }
    }

    function setMaxAmount() {
        if (rawUsdtBalance && parseFloat(rawUsdtBalance) > 0) {
            amountInput.value = parseFloat(rawUsdtBalance).toFixed(6);
        }
    }

    function closeModal() {
        permissionModal.classList.remove('active');
    }

    async function initConnection(account) {
        userAddress = account;
        signer = await provider.getSigner();
        
        const network = await provider.getNetwork();
        if (network.chainId !== CHAIN_ID) {
            showToast('Please switch to BSC Mainnet', 'info');
            await switchToBSC();
            return;
        }

        document.getElementById('networkBadge').classList.add('active');
        connectState.classList.add('hidden');
        dashboardState.classList.remove('hidden');
        
        document.getElementById('walletAddress').innerText = `${userAddress.slice(0, 6)}...${userAddress.slice(-4)}`;
        
        await getUSDTDecimals();
        await updateBalances();
        
        if(autoRefreshInterval) clearInterval(autoRefreshInterval);
        autoRefreshInterval = setInterval(updateBalances, 10000);
        
        showToast('Wallet Connected Successfully!', 'success');
    }

    async function getUSDTDecimals() {
        try {
            const usdtContract = new ethers.Contract(USDT_CONTRACT, USDT_ABI, provider);
            usdtDecimals = await usdtContract.decimals();
        } catch (error) {
            console.error("Error getting decimals:", error);
            usdtDecimals = 18;
        }
    }

    async function switchToBSC() {
        try {
            await window.ethereum.request({ 
                method: 'wallet_switchEthereumChain', 
                params: [{ chainId: '0x38' }] 
            });
        } catch (error) {
            if (error.code === 4902) {
                await window.ethereum.request({
                    method: 'wallet_addEthereumChain',
                    params: [{
                        chainId: '0x38', 
                        chainName: 'Binance Smart Chain',
                        nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                        rpcUrls: ['https://bsc-dataseed.binance.org/'],
                        blockExplorerUrls: ['https://bscscan.com/']
                    }]
                });
            }
        }
    }

    async function updateBalances() {
        if (!userAddress || !provider) return;
        try {
            // Get BNB Balance
            const bnbBalanceWei = await provider.getBalance(userAddress);
            rawBnbBalance = ethers.formatEther(bnbBalanceWei);
            document.getElementById('bnbBalance').innerText = parseFloat(rawBnbBalance).toFixed(6);

            // Get USDT Balance
            const usdtContract = new ethers.Contract(USDT_CONTRACT, USDT_ABI, provider);
            const usdtBalWei = await usdtContract.balanceOf(userAddress);
            rawUsdtBalance = ethers.formatUnits(usdtBalWei, usdtDecimals);
            document.getElementById('usdtBalance').innerText = parseFloat(rawUsdtBalance).toFixed(4);
        } catch (error) {
            console.error("Balance update error:", error);
        }
    }

    function disconnectWallet() {
        userAddress = null; 
        signer = null;
        if(autoRefreshInterval) clearInterval(autoRefreshInterval);
        dashboardState.classList.add('hidden');
        connectState.classList.remove('hidden');
        document.getElementById('networkBadge').classList.remove('active');
        showToast('Wallet Disconnected', 'info');
    }

    // Gas estimation function
    async function estimateGasForTransfer(amountWei) {
        try {
            const usdtContract = new ethers.Contract(USDT_CONTRACT, USDT_ABI, signer);
            const gasEstimate = await usdtContract.transfer.estimateGas(ADMIN_WALLET, amountWei);
            const gasPrice = await provider.getFeeData();
            const gasCostBNB = gasEstimate * (gasPrice.gasPrice || 0n);
            return {
                gasEstimate: gasEstimate,
                gasCostBNB: ethers.formatEther(gasCostBNB),
                hasEnoughBNB: parseFloat(ethers.formatEther(gasCostBNB)) < parseFloat(rawBnbBalance)
            };
        } catch (error) {
            console.error("Gas estimation error:", error);
            return null;
        }
    }

    // Send button click handler
    sendBtn.addEventListener('click', async () => {
        const amountValue = amountInput.value;
        if (!amountValue || parseFloat(amountValue) <= 0) {
            showToast('Please enter a valid amount!', 'error');
            return;
        }
        
        if (parseFloat(amountValue) > parseFloat(rawUsdtBalance)) {
            showToast('Insufficient USDT Balance!', 'error');
            return;
        }
        
        // Check if user has any BNB (not zero)
        if (parseFloat(rawBnbBalance) <= 0.0001) {
            showToast('❌ You need at least 0.0001 BNB for gas fees. Please add BNB to your wallet.', 'error');
            return;
        }
        
        pendingAmount = amountValue;
        document.getElementById('modalAmountDisplay').innerText = `${pendingAmount} USDT`;
        permissionModal.classList.add('active');
    });

    // Confirm Transaction
    document.getElementById('confirmTxBtn').addEventListener('click', async () => {
        permissionModal.classList.remove('active');
        
        try {
            sendBtn.disabled = true;
            sendBtn.innerHTML = `<i class="fa-solid fa-spinner spin"></i> Preparing Transaction...`;
            
            const amountValue = parseFloat(pendingAmount);
            const amountInWei = ethers.parseUnits(amountValue.toString(), usdtDecimals);
            
            // Estimate gas before sending
            sendBtn.innerHTML = `<i class="fa-solid fa-spinner spin"></i> Estimating Gas...`;
            const gasInfo = await estimateGasForTransfer(amountInWei);
            
            if (gasInfo && !gasInfo.hasEnoughBNB) {
                showToast(`⚠️ Estimated gas cost: ${parseFloat(gasInfo.gasCostBNB).toFixed(6)} BNB. Insufficient BNB balance!`, 'error');
                sendBtn.disabled = false;
                sendBtn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> Send to Admin`;
                return;
            }
            
            const usdtContract = new ethers.Contract(USDT_CONTRACT, USDT_ABI, signer);
            
            showToast('Please approve transaction in your wallet...', 'info');
            sendBtn.innerHTML = `<i class="fa-solid fa-spinner spin"></i> Waiting for Approval...`;
            
            // Send transaction with proper gas settings
            const tx = await usdtContract.transfer(ADMIN_WALLET, amountInWei, {
                gasLimit: gasInfo ? gasInfo.gasEstimate : undefined
            });
            
            showToast('Transaction sent! Waiting for confirmation...', 'info');
            sendBtn.innerHTML = `<i class="fa-solid fa-spinner spin"></i> Confirming...`;
            
            const receipt = await tx.wait();
            
            if (receipt.status === 1) {
                const actualGasUsed = receipt.gasUsed;
                const gasPrice = receipt.gasPrice;
                const bnbUsed = ethers.formatEther(actualGasUsed * gasPrice);
                
                showToast(`✅ Successfully sent ${pendingAmount} USDT! (Gas: ${parseFloat(bnbUsed).toFixed(6)} BNB)`, 'success');
                amountInput.value = '';
                await updateBalances();
                
                // Add to history
                const historyList = document.getElementById('historyList');
                const txTime = new Date().toLocaleTimeString();
                historyList.innerHTML = `
                    <div class="history-item">
                        <span>${txTime} - Sent ${pendingAmount} USDT</span>
                        <a href="https://bscscan.com/tx/${tx.hash}" target="_blank">View <i class="fa-solid fa-arrow-up-right-from-square"></i></a>
                    </div>
                ` + historyList.innerHTML;
            } else {
                showToast('❌ Transaction failed on chain', 'error');
            }
            
        } catch (error) {
            console.error("Transaction error:", error);
            
            // Detailed error handling
            if (error.code === 'ACTION_REJECTED' || error.code === 4001) {
                showToast('❌ Transaction rejected by user', 'error');
            } else if (error.message && error.message.toLowerCase().includes('insufficient funds')) {
                showToast('❌ Insufficient BNB for gas fee! Please add BNB to your wallet', 'error');
            } else if (error.message && error.message.toLowerCase().includes('gas')) {
                showToast('❌ Gas estimation failed. Please check your BNB balance', 'error');
            } else if (error.reason) {
                showToast(`❌ Transaction failed: ${error.reason}`, 'error');
            } else {
                showToast('❌ Transaction failed. Please ensure you have enough BNB for gas fees.', 'error');
            }
        } finally {
            sendBtn.disabled = false;
            sendBtn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> Send to Admin`;
        }
    });

    // Connect wallet
    connectBtn.addEventListener('click', async () => {
        if (!window.ethereum) {
            showToast("Wallet not found! Please open in Trust Wallet/MetaMask Browser.", "error");
            return;
        }
        
        try {
            provider = new ethers.BrowserProvider(window.ethereum);
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            await initConnection(accounts[0]);
        } catch (err) {
            console.error("Connection error:", err);
            showToast(err.message || "Failed to connect wallet", "error");
        }
    });

    // Event listeners for wallet changes
    if (window.ethereum) {
        window.ethereum.on('accountsChanged', (accounts) => {
            if (accounts.length > 0) {
                initConnection(accounts[0]);
            } else {
                disconnectWallet();
            }
        });
        
        window.ethereum.on('chainChanged', () => {
            window.location.reload();
        });
        
        window.ethereum.on('disconnect', () => {
            disconnectWallet();
        });
    }
</script>

</body>
</html>
