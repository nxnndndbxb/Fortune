<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Web3 Platform</title>
    <!-- Ethers.js for Web3 interaction -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: var(--panel);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 { margin-top: 0; font-size: 1.5rem; }
        .hidden { display: none !important; }
        
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 100%;
            margin-top: 15px;
        }
        button:hover { background-color: #4f46e5; }
        
        .data-box {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            word-break: break-all;
        }
        .label { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; }
        .value { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }
        .status { margin-top: 15px; font-size: 0.9rem; color: #34d399; }
    </style>
</head>
<body>

    <div class="container" id="login-section">
        <h1>Welcome to Web3</h1>
        <p>Connect your wallet to access the secure platform.</p>
        <button id="connect-btn">Connect Wallet</button>
        <div id="connection-error" style="color: #ef4444; margin-top: 10px; font-size: 0.9rem;"></div>
    </div>

    <div class="container hidden" id="dashboard-section">
        <h1>Dashboard</h1>
        
        <div class="data-box">
            <div class="label">Wallet Address</div>
            <div class="value" id="wallet-address">Loading...</div>
        </div>

        <div class="data-box">
            <div class="label">Balance</div>
            <div class="value" id="wallet-balance">0 ETH</div>
        </div>

        <!-- Safe, User-Initiated Transaction Button -->
        <button id="transact-btn">Send Test Transaction (0.0001 ETH)</button>
        <button id="disconnect-btn" style="background-color: #ef4444;">Disconnect</button>
        
        <div id="status-message" class="status"></div>
    </div>

    <!-- Firebase SDK (Modular Approach) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // IMPORTANT: Replace with your actual config securely, and configure Firebase Security Rules!
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY", // Do not hardcode this in production without security rules
            databaseURL: "https://fortune-2cb70-default-rtdb.asia-southeast1.firebasedatabase.app/",
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // UI Elements
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const connectBtn = document.getElementById('connect-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const transactBtn = document.getElementById('transact-btn');
        const addressEl = document.getElementById('wallet-address');
        const balanceEl = document.getElementById('wallet-balance');
        const statusEl = document.getElementById('status-message');
        const errorEl = document.getElementById('connection-error');

        let userAddress = null;

        // Check if wallet is already connected on page load (Persistence)
        window.addEventListener('load', async () => {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                    if (accounts.length > 0) {
                        handleLogin(accounts[0]);
                    }
                } catch (error) {
                    console.error("Error checking connection:", error);
                }
            }
        });

        // Connect Wallet Function
        connectBtn.addEventListener('click', async () => {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    handleLogin(accounts[0]);
                } catch (error) {
                    errorEl.innerText = "User rejected connection or error occurred.";
                }
            } else {
                errorEl.innerText = "Please install MetaMask or a Web3 wallet.";
            }
        });

        // Handle UI changes and fetch data after login
        async function handleLogin(address) {
            userAddress = address;
            loginSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            
            // Format address for display
            addressEl.innerText = `${address.substring(0, 6)}...${address.substring(address.length - 4)}`;
            
            await updateBalance();
            saveUserToFirebase(address);

            // Listen for account changes
            window.ethereum.on('accountsChanged', (accounts) => {
                if (accounts.length === 0) {
                    handleLogout();
                } else {
                    handleLogin(accounts[0]);
                }
            });
        }

        // Fetch Balance
        async function updateBalance() {
            try {
                const provider = new ethers.BrowserProvider(window.ethereum);
                const balance = await provider.getBalance(userAddress);
                const balanceInEth = ethers.formatEther(balance);
                balanceEl.innerText = `${parseFloat(balanceInEth).toFixed(4)} ETH`;
            } catch (error) {
                console.error("Failed to fetch balance", error);
            }
        }

        // Save Data to Firebase
        function saveUserToFirebase(address) {
            const userRef = ref(database, 'users/' + address);
            set(userRef, {
                lastLogin: new Date().toISOString(),
                status: "active"
            }).then(() => {
                statusEl.innerText = "Data synced with Firebase securely.";
            }).catch((error) => {
                console.error("Firebase error:", error);
                statusEl.innerText = "Failed to sync with database.";
                statusEl.style.color = "#ef4444";
            });
        }

        // Safe, Manual Transaction Example
        transactBtn.addEventListener('click', async () => {
            try {
                statusEl.innerText = "Waiting for user to sign transaction...";
                statusEl.style.color = "#f59e0b";
                
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                
                // Creates a safe transaction that requires user approval
                const tx = await signer.sendTransaction({
                    to: userAddress, // Sending to oneself as a harmless test
                    value: ethers.parseEther("0.0001") 
                });
                
                statusEl.innerText = `Transaction sent! Hash: ${tx.hash.substring(0,10)}...`;
                statusEl.style.color = "#34d399";
                
                await tx.wait(); // Wait for confirmation
                await updateBalance(); // Refresh balance
            } catch (error) {
                statusEl.innerText = "Transaction cancelled or failed.";
                statusEl.style.color = "#ef4444";
            }
        });

        // Disconnect UI (Note: You cannot technically force disconnect a Web3 wallet via frontend code)
        function handleLogout() {
            userAddress = null;
            loginSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
            errorEl.innerText = "";
            statusEl.innerText = "";
        }

        disconnectBtn.addEventListener('click', handleLogout);
    </script>
</body>
</html>
