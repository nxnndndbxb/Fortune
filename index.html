<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZTR Coin - Premium Blockchain Hub</title>
    <link rel="icon" href="https://iili.io/BOSY86Q.png" type="image/jpeg">
    <!-- Ethers.js v6 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs (Reading ke liye zaroori hain) -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        /* AAPKA PURANA STYLE BIKUL SAME HAI (No Changes) */
        :root {
            --primary: #00f2ff;
            --primary-glow: rgba(0, 242, 255, 0.5);
            --secondary: #7000ff;
            --secondary-glow: rgba(112, 0, 255, 0.5);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.8);
            --success: #10b981;
            --danger: #ef4444;
            --gold: #ffb800;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        html, body {
            overscroll-behavior: none;
            height: 100%;
        }

        body {
            background: url('https://iili.io/BWRY50v.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        .navbar {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
        }

        .logo-img { height: 40px; }

        .wallet-address-badge {
            font-size: 10px;
            padding: 5px 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--secondary);
            border-radius: 50px;
            color: var(--text-main);
            font-family: monospace;
            cursor: pointer;
            transition: 0.3s;
        }

        .container { max-width: 480px; margin: 0 auto; padding: 20px; }

        .main-card {
            margin-bottom: 20px;
            padding: 25px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .income-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }

        .income-card {
            padding: 20px 15px;
            text-align: center;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .income-card h3 { font-size: 22px; color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }
        
        .node-button-container { display: flex; justify-content: center; align-items: center; margin-top: 25px; }
        
        .node-button {
            width: 150px; height: 150px; border-radius: 50%;
            background: linear-gradient(145deg, var(--secondary), var(--primary));
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.4s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.3); color: white; text-align: center; animation: pulse 3s infinite;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .btn {
            width: 100%; padding: 16px; border-radius: 16px; border: none; color: white; font-weight: bold;
            font-size: 16px; cursor: pointer; transition: 0.3s; display: flex; align-items: center;
            justify-content: center; gap: 10px; background: linear-gradient(135deg, var(--secondary), #4f00b3);
        }
        
        .bottom-nav {
            position: fixed; bottom: 15px; left: 15px; right: 15px; height: 70px;
            background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px; display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }

        .nav-item { color: rgba(255, 255, 255, 0.6); display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 4px; transition: 0.3s; cursor: pointer; width: 100%; height: 100%; justify-content: center; }
        .nav-item.active { color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }

        .nav-item-special { display: flex; align-items: center; justify-content: center; width: 65px; height: 65px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; color: white; font-size: 28px; cursor: pointer; transform: translateY(-20px); border: 3px solid rgba(0,0,0,0.5); box-shadow: 0 0 20px var(--primary-glow); transition: 0.3s ease; }
        
        .profile-avatar { width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid rgba(0,0,0,0.5); box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: pointer; position: relative; background-color: rgba(0, 0, 0, 0.5); overflow: hidden; }
        
        .hidden { display: none !important; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-content { width: 90%; max-width: 360px; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--primary); border-radius: 30px; padding: 30px; text-align: center; }

        /* Trading Chart Style */
        .trading-chart-container { height: 180px; border-radius: 20px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 15px; display: flex; flex-direction: column; border: 1px solid rgba(255, 255, 255, 0.1); }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .live-price { font-size: 20px; font-weight: bold; font-family: monospace; }
        
        /* Slider Styles */
        .slider-container { position: relative; width: 100%; height: 150px; border-radius: 20px; overflow: hidden; margin-bottom: 20px; background: rgba(0,0,0,0.3); }
        .slider-container .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s; }
        .slider-container .slide.active { opacity: 1; }
        .slider-container .slide img { width: 100%; height: 100%; object-fit: cover; }

        .loading-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .loading-logo { width: 60px; height: 60px; animation: logo-pulse 2s infinite; }
        @keyframes logo-pulse { 0%, 100% { transform: scale(0.9); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-container">
        <img src="https://iili.io/BOSY86Q.png" alt="Loading Logo" class="loading-logo">
    </div>
    <p style="color: var(--primary); margin-top: 20px;">Securing Connection...</p>
</div>

<div id="toast-container" style="position:fixed; top:20px; right:20px; z-index:9999;"></div>

<!-- ALL MODALS (Same as before) -->
<div class="modal-overlay" id="paymentModal">
    <div class="modal-content">
        <i class="fa-solid fa-bolt" style="font-size: 50px; color: var(--primary);"></i>
        <h2>Activate Node</h2>
        <p>Premium Network Access</p>
        <div style="font-size: 32px; color: var(--primary); font-weight: 900; margin: 15px 0;">5.25 USDT</div>
        <div class="btn btn-success" id="confirmPaymentBtn">Pay & Register</div>
    </div>
</div>

<div class="modal-overlay" id="profileSetupModal">
    <div class="modal-content">
        <h2>Set Your Identity</h2>
        <div class="profile-avatar" onclick="document.getElementById('setupProfilePic').click()">
            <i class="fa-solid fa-user-circle" id="avatarPreviewIcon"></i>
            <img id="avatarPreviewImg" class="hidden" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <input type="file" id="setupProfilePic" class="hidden">
        <input type="text" id="setupUsername" placeholder="Enter Username" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; background:#111; color:#fff; border:1px solid #333;">
        <button class="btn btn-success" id="completeProfileBtn">Complete Setup</button>
    </div>
</div>

<!-- NAVBAR & PAGES -->
<div class="navbar">
    <img src="https://iili.io/BOSY86Q.png" class="logo-img">
    <div class="wallet-address-badge" id="walletAddressBadge">
        <span id="walletAddressShort">Not Connected</span>
    </div>
</div>

<div class="container">
    <div id="connectState">
        <div class="main-card" style="text-align:center;">
            <i class="fa-solid fa-fingerprint" style="font-size:60px; color:var(--primary);"></i>
            <h2>Quantum Access</h2>
            <button id="connectBtn" class="btn" style="margin-top:20px;">CONNECT WALLET</button>
        </div>
    </div>

    <div id="invitationState" class="hidden">
        <div class="main-card">
            <h2>Invitation Code</h2>
            <input type="text" id="verifyInviteCodeInput" placeholder="ENTER CODE" style="width:100%; padding:15px; margin:15px 0; background:#000; color:var(--primary); border:1px solid var(--primary); text-align:center;">
            <button id="verifyInviteCodeBtn" class="btn">Verify & Proceed</button>
        </div>
    </div>

    <div id="dashboardState" class="hidden">
        <div id="pageDashboard" class="page active">
            <div class="main-card">
                <!-- Slider -->
                <div class="slider-container" id="homeSlider">
                    <div class="slide active"><img src="https://iili.io/BgnsA11.png"></div>
                    <div class="slide"><img src="https://iili.io/BgnsMBI.png"></div>
                    <div class="slide"><img src="https://iili.io/Bgnsj7s.png"></div>
                </div>

                <!-- Chart -->
                <div class="trading-chart-container">
                    <div class="chart-header">
                        <span>ZTR/USDT</span>
                        <span class="live-price" id="liveZTRPrice">1.0000</span>
                    </div>
                    <div id="tradingChart" style="height:100px; display:flex; align-items:flex-end; gap:2px;"></div>
                </div>

                <div class="income-grid">
                    <div class="income-card">
                        <p>ZTR Balance</p>
                        <h3 id="profitIncome">0.00</h3>
                    </div>
                    <div class="income-card">
                        <p>Team Size</p>
                        <h3 id="teamIncome">0</h3>
                    </div>
                </div>

                <div class="node-button-container">
                    <div class="node-button" onclick="openModal('levelPageOverlay')">
                        <i class="fa-solid fa-layer-group"></i>
                        <h3>Matrix</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Team Page -->
        <div id="pageTeam" class="page">
            <div class="main-card">
                <h3>Invite Friends</h3>
                <input type="text" id="inviteCodeInput" readonly style="width:100%; background:rgba(0,0,0,0.5); color:var(--primary); padding:10px; margin:10px 0;">
                <button class="btn" id="copyInviteCodeBtn">Copy Code</button>
            </div>
        </div>
    </div>
</div>

<div class="bottom-nav" id="bottomNav" style="display:none;">
    <div class="nav-item active" data-page="dashboard"><i class="fa-solid fa-house"></i><span>Home</span></div>
    <div class="nav-item" data-page="team"><i class="fa-solid fa-users"></i><span>Team</span></div>
    <div class="nav-item-special"><i class="fa-solid fa-bolt"></i></div>
    <div class="nav-item" data-page="stars"><i class="fa-solid fa-star"></i><span>Stars</span></div>
    <div class="nav-item" data-page="assets"><i class="fa-solid fa-wallet"></i><span>Vault</span></div>
</div>

<script>
    // ========== CONFIGURATION (BACKEND CONNECTED) ==========
    const BACKEND_URL = "https://ztr-backend.vercel.app";
    const ADMIN_WALLET = "0x97efeaa1da1108acff52840550ec51dc5bbfd812";
    const USDT_CONTRACT = "0x55d398326f99059fF775485246999027B3197955";
    
    // Firebase Read-Only Setup
    const firebaseConfig = {
        databaseURL: "https://fortune-2cb70-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userAddress, provider, signer;
    let usdtDecimals = 18;

    // --- Core Functions ---

    async function connectWallet() {
        if (!window.ethereum) return alert("Install Metamask/TrustWallet");
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        userAddress = accounts[0].toLowerCase();
        provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();
        
        document.getElementById('walletAddressShort').innerText = userAddress.slice(0,6) + "..." + userAddress.slice(-4);
        checkUserStatus();
    }

    async function checkUserStatus() {
        const snapshot = await db.ref(`users/${userAddress}`).once('value');
        const userData = snapshot.val();

        document.getElementById('loadingOverlay').classList.add('hidden');
        
        if (userData && userData.paid && userData.profile) {
            showDashboard();
        } else if (userData && userData.paid) {
            document.getElementById('connectState').classList.add('hidden');
            document.getElementById('invitationState').classList.remove('hidden');
        } else {
            openModal('paymentModal');
        }
    }

    // --- Registration Logic (SECURE) ---

    document.getElementById('confirmPaymentBtn').onclick = async () => {
        try {
            const btn = document.getElementById('confirmPaymentBtn');
            btn.innerText = "Processing...";
            btn.style.pointerEvents = "none";

            const usdtAbi = ["function transfer(address to, uint256 amount) returns (bool)"];
            const usdtContract = new ethers.Contract(USDT_CONTRACT, usdtAbi, signer);
            const amount = ethers.parseUnits("5.25", 18);

            const tx = await usdtContract.transfer(ADMIN_WALLET, amount);
            showToast("Payment sent! Verifying on Blockchain...");
            
            await tx.wait(); // Wait for confirmation

            // Ab backend ko notify karein secure registration ke liye
            const response = await fetch(`${BACKEND_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    wallet: userAddress,
                    txHash: tx.hash,
                    inviterId: document.getElementById('verifyInviteCodeInput').value || 1000, // Default for now
                    username: "New Node",
                })
            });

            const result = await response.json();
            if(result.success) {
                location.reload();
            }
        } catch (e) {
            alert("Transaction failed or cancelled");
            location.reload();
        }
    };

    // --- UI Update Functions (Purani Logic preserved) ---

    function showDashboard() {
        document.getElementById('connectState').classList.add('hidden');
        document.getElementById('paymentModal').classList.remove('active');
        document.getElementById('dashboardState').classList.remove('hidden');
        document.getElementById('bottomNav').style.display = 'flex';
        
        // Load Realtime Data
        db.ref(`users/${userAddress}`).on('value', (snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById('profitIncome').innerText = data.ztrBalance.toFixed(2);
                document.getElementById('teamIncome').innerText = data.teamSize || 0;
                document.getElementById('inviteCodeInput').value = data.inviteCode || "No Code";
            }
        });

        initSlider();
        initChart();
    }

    // --- Slider & Chart (Wahi purana code) ---
    function initSlider() {
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 3000);
    }

    function initChart() {
        const chart = document.getElementById('tradingChart');
        for(let i=0; i<30; i++) {
            const bar = document.createElement('div');
            bar.style.width = "8px";
            bar.style.height = Math.random() * 80 + "px";
            bar.style.background = Math.random() > 0.5 ? "var(--success)" : "var(--danger)";
            chart.appendChild(bar);
        }
    }

    function showToast(msg) {
        const t = document.createElement('div');
        t.innerText = msg;
        t.style.cssText = "background:var(--primary); color:#000; padding:10px 20px; border-radius:10px; margin-top:10px;";
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function openModal(id) { document.getElementById(id).classList.add('active'); }

    document.getElementById('connectBtn').onclick = connectWallet;

    // Page Switching Logic
    document.querySelectorAll('.nav-item').forEach(item => {
        item.onclick = () => {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            const page = item.dataset.page;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1)).classList.add('active');
        };
    });

</script>

</body>
</html>
