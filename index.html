<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ZTR Coin - Premium Blockchain Hub</title>
    <link rel="icon" href="https://iili.io/BOSY86Q.png" type="image/jpeg">
    <!-- Ethers.js v6 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs (For Reading Data Only) -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        /* [SAARA CSS WAHI HAI JO AAPNE DIYA THA - NO CHANGES] */
        :root {
            --primary: #00f2ff;
            --primary-glow: rgba(0, 242, 255, 0.5);
            --secondary: #7000ff;
            --secondary-glow: rgba(112, 0, 255, 0.5);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.8);
            --success: #10b981;
            --danger: #ef4444;
            --gold: #ffb800;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        html, body { overscroll-behavior: none; height: 100%; }

        body {
            background: url('https://iili.io/BWRY50v.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 90px;
            overflow-x: hidden;
        }
        /* ... (Saara CSS wahi rahega jo aapki file me tha) ... */
        /* [CSS ka baaqi hissa aapki original file se same to same copy kar dein] */
        .navbar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; background: rgba(0, 0, 0, 0.5); }
        .logo-img { height: 40px; }
        .wallet-address-badge { font-size: 10px; padding: 5px 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid var(--secondary); border-radius: 50px; color: var(--text-main); font-family: monospace; cursor: pointer; transition: 0.3s; }
        .container { max-width: 480px; margin: 0 auto; padding: 20px; }
        .main-card { margin-bottom: 20px; padding: 25px; background: rgba(0, 0, 0, 0.3); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .income-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .income-card { padding: 20px 15px; text-align: center; border-radius: 20px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; }
        .income-card h3 { font-size: 22px; color: var(--primary); text-shadow: 0 0 10px var(--primary-glow); }
        .node-button-container { display: flex; justify-content: center; align-items: center; margin-top: 25px; }
        .node-button { width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(145deg, var(--secondary), var(--primary)); display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: all 0.4s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.3); color: white; text-align: center; animation: pulse 3s infinite; }
        .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; color: white; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; background: linear-gradient(135deg, var(--secondary), #4f00b3); }
        .bottom-nav { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 70px; background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { color: rgba(255, 255, 255, 0.6); display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 4px; transition: 0.3s; cursor: pointer; width: 100%; height: 100%; justify-content: center; }
        .nav-item.active { color: var(--primary); }
        .nav-item-special { display: flex; align-items: center; justify-content: center; width: 65px; height: 65px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; color: white; font-size: 28px; cursor: pointer; transform: translateY(-20px); border: 3px solid rgba(0,0,0,0.5); box-shadow: 0 0 20px var(--primary-glow); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-content { width: 90%; max-width: 360px; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--primary); border-radius: 30px; padding: 30px; text-align: center; }
        .hidden { display: none !important; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        .trading-chart-container { height: 180px; border-radius: 20px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 15px; display: flex; flex-direction: column; border: 1px solid rgba(255, 255, 255, 0.1); }
        .slider-container { position: relative; width: 100%; height: 150px; border-radius: 20px; overflow: hidden; margin-bottom: 20px; background: rgba(0,0,0,0.3); }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* [End of CSS - Maine bohot brief rakha hai par aap poora purana CSS copy kar sakte hain] */
    </style>
</head>
<body>

<!-- [SAARA HTML WAHI HAI JO AAPNE DIYA THA - NO CHANGES] -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-container">
        <div class="loading-ring r1"></div>
        <div class="loading-ring r2"></div>
        <img src="https://iili.io/BOSY86Q.png" alt="Loading Logo" class="loading-logo">
    </div>
    <p class="loading-text">Connecting to Secure Protocol...</p>
</div>

<div id="toast-container" style="position:fixed; top:20px; right:20px; z-index:9999;"></div>

<!-- Matrix Page Overlay -->
<div class="level-page-overlay" id="levelPageOverlay">
    <div class="level-page-header">
        <button class="level-page-back-btn" onclick="closeLevelPage()"><i class="fa-solid fa-arrow-left"></i></button>
        <h2>Level Matrix</h2>
        <div style="width:20px;"></div>
    </div>
    <div class="level-viewer-container" id="levelViewer"></div>
</div>

<!-- Profiles, Stars, Modals... (Sub wahi hai jo pehle tha) -->
<!-- HTML ka baaqi hissa same to same purani file se copy karlein -->

<!-- (Example components from original file) -->
<div class="navbar">
    <img src="https://iili.io/BOSY86Q.png" alt="ZTR Logo" class="logo-img">
    <div class="wallet-address-badge" id="walletAddressBadge" style="display: none;">
        <i class="fa-solid fa-wallet"></i> <span id="walletAddressShort">Not Connected</span>
    </div>
</div>

<div class="container">
    <!-- State 1: Connect -->
    <div id="connectState">
        <div class="main-card">
            <div style="text-align:center;">
                <div style="font-size:60px; color:var(--primary); margin-bottom:20px;"><i class="fa-solid fa-fingerprint"></i></div>
                <h2 style="margin-bottom:10px;">Secure Access</h2>
                <button id="connectBtn" class="btn"><i class="fa-solid fa-link"></i> CONNECT WALLET</button>
            </div>
        </div>
    </div>

    <!-- State 2: Invitation -->
    <div id="invitationState" class="hidden">
        <div class="main-card">
            <div style="text-align:center;">
                <h2 style="margin-bottom:15px;">Invitation Required</h2>
                <div class="invite-code-input-group">
                    <input type="text" id="verifyInviteCodeInput" placeholder="ENTER CODE">
                    <button id="verifyInviteCodeBtn">Verify</button>
                </div>
                <div id="inviterVerifyStatus"></div>
                <button class="btn btn-success" id="proceedToProfileBtn" disabled>Set Up Identity</button>
            </div>
        </div>
    </div>

    <!-- Dashboard State -->
    <div id="dashboardState" class="hidden">
        <!-- Home Page (Slider & Chart) -->
        <div id="pageDashboard" class="page active">
            <div class="main-card">
                <!-- Slider Placeholder -->
                <div class="slider-container" id="homeSlider">
                    <div class="slide"><img src="https://iili.io/BgnsA11.png"></div>
                    <div class="slide"><img src="https://iili.io/BgnsMBI.png"></div>
                </div>
                <!-- Chart Placeholder -->
                <div class="trading-chart-container">
                    <div id="tradingChart"></div>
                </div>
                <!-- Balance Grid -->
                <div class="income-grid">
                    <div class="income-card"><h3>0.00 ZTR</h3><p>Balance</p></div>
                    <div class="income-card"><h3>0</h3><p>Team</p></div>
                </div>
            </div>
        </div>
        <!-- (Other pages... Team, Stars, Assets) -->
    </div>
</div>

<div class="bottom-nav" id="bottomNav" style="display: none;">
    <div class="nav-item active" data-page="dashboard"><i class="fa-solid fa-house"></i><span>Home</span></div>
    <div class="nav-item" data-page="team"><i class="fa-solid fa-users"></i><span>Team</span></div>
    <div class="nav-item-special" onclick="openLevelPage()"><i class="fa-solid fa-layer-group"></i></div>
    <div class="nav-item" data-page="assets"><i class="fa-solid fa-wallet"></i><span>Vault</span></div>
</div>

<script>
    // ========== SECURE BACKEND CONFIGURATION ==========
    const API_BASE_URL = "https://ztr-backend.vercel.app/api"; // Aapka Backend Link
    
    // Firebase Config (Ab sirf Data Reading ke liye use hogi)
    const firebaseConfig = {
        apiKey: "AIzaSyBbrToB9q01xSfRR21e5XaeGJGhVHmBN1w",
        databaseURL: "https://fortune-2cb70-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Blockchain Config
    const ADMIN_WALLET = "0x97efeaa1da1108acff52840550ec51dc5bbfd812";
    const USDT_CONTRACT = "0x55d398326f99059fF775485246999027B3197955";
    const USDT_ABI = ["function transfer(address to, uint256 amount) returns (bool)", "function decimals() view returns (uint8)"];

    let userAddress, provider, signer;

    // --- FUNCTION: Register User via Backend ---
    async function registerUserSecurely(txHash, inviterId, username, profilePic) {
        try {
            const response = await fetch(`${API_BASE_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    wallet: userAddress,
                    txHash: txHash,
                    inviterId: inviterId,
                    username: username,
                    profilePic: profilePic
                })
            });
            return await response.json();
        } catch (e) {
            console.error("Registration Error", e);
            return { success: false };
        }
    }

    // --- FUNCTION: Upgrade Level via Backend ---
    async function upgradeLevelSecurely(txHash, levelId) {
        try {
            const response = await fetch(`${API_BASE_URL}/upgrade`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    wallet: userAddress,
                    txHash: txHash,
                    levelId: levelId
                })
            });
            return await response.json();
        } catch (e) { return { success: false }; }
    }

    // --- FUNCTION: Withdraw via Backend ---
    async function requestWithdrawalSecurely() {
        try {
            const response = await fetch(`${API_BASE_URL}/withdraw`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ wallet: userAddress })
            });
            return await response.json();
        } catch (e) { return { success: false }; }
    }

    // ========== UPDATED EVENT LISTENERS (CONNECTED TO BACKEND) ==========

    // 1. Confirm Payment (Node Activation)
    document.getElementById('confirmPaymentBtn').addEventListener('click', async () => {
        // [BLOCKCHAIN PAYMENT PART]
        const usdtContract = new ethers.Contract(USDT_CONTRACT, USDT_ABI, signer);
        const amount = ethers.parseUnits("5.25", 18); // Example amount
        
        try {
            showToast("Waiting for Blockchain Confirmation...", "info");
            const tx = await usdtContract.transfer(ADMIN_WALLET, amount);
            const receipt = await tx.wait();
            
            // PAYMNENT SUCCESSFUL -> AB BACKEND KO BHEJO DATA SAVE KARNE KE LIYE
            window.tempTxHash = receipt.hash;
            
            // Ab user profile setup page par jayega
            document.getElementById('paymentModal').classList.remove('active');
            document.getElementById('connectState').classList.add('hidden');
            document.getElementById('invitationState').classList.remove('hidden');
            
        } catch (e) { showToast("Transaction Failed", "error"); }
    });

    // 2. Final Profile Setup
    document.getElementById('completeProfileBtn').addEventListener('click', async () => {
        const username = document.getElementById('setupUsername').value;
        const inviterId = window.verifiedInviterId;
        const txHash = window.tempTxHash;

        showToast("Saving your identity securely...", "info");
        const result = await registerUserSecurely(txHash, inviterId, username, null);

        if (result.success) {
            showToast("Welcome to ZTR Network!", "success");
            location.reload(); // Refresh to load dashboard
        } else {
            showToast("Error saving data. Please contact support.", "error");
        }
    });

    // 3. Upgrade Matrix Level
    async function processUpgrade(levelId, amountZTR) {
        const usdtAmount = (amountZTR * window.liveZTRPrice).toFixed(2);
        const usdtContract = new ethers.Contract(USDT_CONTRACT, USDT_ABI, signer);
        
        try {
            const tx = await usdtContract.transfer(ADMIN_WALLET, ethers.parseUnits(usdtAmount, 18));
            const receipt = await tx.wait();
            
            const result = await upgradeLevelSecurely(receipt.hash, levelId);
            if(result.success) {
                showToast("Level Upgraded!", "success");
                location.reload();
            }
        } catch (e) { showToast("Upgrade Failed", "error"); }
    }

    // 4. Withdrawal Request
    document.getElementById('confirmWithdrawalBtn').addEventListener('click', async () => {
        const result = await requestWithdrawalSecurely();
        if(result.success) {
            showToast("Withdrawal Requested! Pending approval.", "success");
            location.reload();
        } else {
            showToast("Request Failed", "error");
        }
    });

    // [NOTE: Saare visual functions (Chart, Slider, Tree) jo pehle thay, wo wesay hi rahenge]
    // [Database reading (db.ref().on('value')) wesay hi chalega profile dikhane ke liye]

</script>
</body>
</html>
