<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Web3 Platform - BSC</title>
    <!-- Ethers.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    
    <style>
        :root { --primary: #f3ba2f; /* Binance Yellow */ --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background-color: var(--panel); padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 100%; max-width: 400px; }
        h1 { margin-top: 0; font-size: 1.5rem; }
        .hidden { display: none !important; }
        button { background-color: var(--primary); color: #111; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
        button:hover { background-color: #e5a91e; }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        .data-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin: 15px 0; word-break: break-all; }
        .label { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; }
        .value { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }
        .status { margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container" id="login-section">
        <h1>Binance Smart Chain Platform</h1>
        <p>Connect your wallet to join.</p>
        <button id="connect-btn">Connect Wallet</button>
        <div id="error-message" style="color: #ef4444; margin-top: 10px;"></div>
    </div>

    <div class="container hidden" id="dashboard-section">
        <h1>Dashboard</h1>
        
        <div class="data-box">
            <div class="label">Wallet Address</div>
            <div class="value" id="wallet-address">Loading...</div>
        </div>

        <div class="data-box">
            <div class="label">USDT (BEP-20) Balance</div>
            <div class="value" id="usdt-balance">0.00 USDT</div>
        </div>

        <p id="fee-status" style="font-size: 0.9rem; color: #f3ba2f;">Joining Fee Required: 0.01 USDT</p>
        
        <!-- User must click this to pay. It cannot happen automatically. -->
        <button id="pay-fee-btn">Pay 0.01 USDT Joining Fee</button>
        
        <div id="status-message" class="status"></div>
    </div>

    <script>
        // CONFIGURATION
        const ADMIN_WALLET = "0xYourAdminWalletAddressHere"; // <-- APNA ADMIN WALLET ADDRESS YAHAN DALEIN
        const USDT_CONTRACT_ADDRESS = "0x55d398326f99059fF775485246999027B3197955"; // BSC Mainnet USDT Address
        const BSC_CHAIN_ID = '0x38'; // Chain ID for BSC Mainnet (56 in hex)
        
        // Minimal ABI for ERC20/BEP20 Token (Only balance and transfer)
        const minABI = [
            "function balanceOf(address owner) view returns (uint256)",
            "function transfer(address to, uint amount) returns (bool)",
            "function decimals() view returns (uint8)"
        ];

        let userAddress = null;
        let provider, signer, usdtContract;

        // UI Elements
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const connectBtn = document.getElementById('connect-btn');
        const payFeeBtn = document.getElementById('pay-fee-btn');
        const addressEl = document.getElementById('wallet-address');
        const usdtBalanceEl = document.getElementById('usdt-balance');
        const statusEl = document.getElementById('status-message');
        const errorEl = document.getElementById('error-message');

        connectBtn.addEventListener('click', async () => {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    // Switch to BSC Network automatically if user is on Ethereum etc.
                    await switchToBSC();
                    
                    setupEthers(accounts[0]);
                } catch (error) {
                    errorEl.innerText = "Connection failed. Please try again.";
                }
            } else {
                errorEl.innerText = "Please install MetaMask or TrustWallet!";
            }
        });

        async function switchToBSC() {
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: BSC_CHAIN_ID }],
                });
            } catch (switchError) {
                // This error code indicates that the chain has not been added to MetaMask.
                if (switchError.code === 4902) {
                    try {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: BSC_CHAIN_ID,
                                chainName: 'Binance Smart Chain Mainnet',
                                rpcUrls: ['https://bsc-dataseed.binance.org/'],
                                nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                                blockExplorerUrls: ['https://bscscan.com/']
                            }],
                        });
                    } catch (addError) {
                        console.error("Failed to add network:", addError);
                    }
                }
            }
        }

        async function setupEthers(address) {
            userAddress = address;
            loginSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            
            addressEl.innerText = `${address.substring(0, 6)}...${address.substring(address.length - 4)}`;
            
            provider = new ethers.BrowserProvider(window.ethereum);
            signer = await provider.getSigner();
            usdtContract = new ethers.Contract(USDT_CONTRACT_ADDRESS, minABI, signer);

            updateUSDTBalance();
        }

        async function updateUSDTBalance() {
            try {
                const balance = await usdtContract.balanceOf(userAddress);
                const decimals = await usdtContract.decimals();
                const formattedBalance = ethers.formatUnits(balance, decimals);
                usdtBalanceEl.innerText = `${parseFloat(formattedBalance).toFixed(2)} USDT`;
                
                if (parseFloat(formattedBalance) < 0.01) {
                    payFeeBtn.disabled = true;
                    payFeeBtn.innerText = "Insufficient USDT Balance";
                }
            } catch (error) {
                console.error("Error fetching balance:", error);
            }
        }

        // Pay Joining Fee Logic
        payFeeBtn.addEventListener('click', async () => {
            try {
                statusEl.innerText = "Please confirm the transaction in your wallet...";
                statusEl.style.color = "#f3ba2f";
                payFeeBtn.disabled = true;

                // Amount to send: 0.01 USDT (USDT uses 18 decimals on BSC)
                const amountToSend = ethers.parseUnits("0.01", 18);

                // Execute BEP-20 Transfer
                const tx = await usdtContract.transfer(ADMIN_WALLET, amountToSend);
                
                statusEl.innerText = `Transaction pending... Hash: ${tx.hash.substring(0,10)}...`;
                
                await tx.wait(); // Wait for confirmation on the blockchain
                
                statusEl.innerText = "Fee Paid Successfully! Welcome.";
                statusEl.style.color = "#34d399";
                document.getElementById('fee-status').style.display = 'none';
                payFeeBtn.style.display = 'none'; // Hide button after payment
                
                updateUSDTBalance(); // Update UI

            } catch (error) {
                console.error(error);
                statusEl.innerText = "Transaction failed or cancelled by user.";
                statusEl.style.color = "#ef4444";
                payFeeBtn.disabled = false;
            }
        });

    </script>
</body>
</html>
